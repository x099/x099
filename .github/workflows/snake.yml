name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"   # twice a day
  workflow_dispatch:          # manual run
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#22c55e&color_dots=#ebedf0,#9be9a8,#4ade80,#22c55e,#15803d
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#22c55e&color_dots=#0c0c15,#15803d,#22c55e,#4ade80,#86efac

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
