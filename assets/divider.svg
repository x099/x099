<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 8" width="1000" height="8" fill="none" role="presentation">
  <defs>
    <linearGradient id="d" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4ade80" stop-opacity="1"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="3" width="1000" height="2" fill="url(#d)"/>
  <circle cx="0" cy="4" r="3" fill="#4ade80">
    <animate attributeName="cx" values="60;940;60" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;1;0.3" dur="6s" repeatCount="indefinite"/>
  </circle>
</svg>
