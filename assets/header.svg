<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 260" width="1000" height="260" fill="none" role="img" aria-label="Yad Carias — Fundador y CEO en Obsidian-Sec">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="55%" stop-color="#13131f"/>
      <stop offset="100%" stop-color="#1c1330"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#6e3bff" stop-opacity="0.45"/>
      <stop offset="45%" stop-color="#6e3bff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#6e3bff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9a78ff"/>
      <stop offset="100%" stop-color="#6e3bff"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- fondo -->
  <rect width="1000" height="260" fill="url(#bg)"/>
  <rect width="1000" height="260" fill="url(#glow)"/>

  <!-- rejilla sutil -->
  <g stroke="#6e3bff" stroke-opacity="0.06">
    <path d="M0 65 H1000 M0 130 H1000 M0 195 H1000"/>
    <path d="M125 0 V260 M250 0 V260 M375 0 V260 M500 0 V260 M625 0 V260 M750 0 V260 M875 0 V260"/>
  </g>

  <!-- partículas flotantes -->
  <g fill="#9a78ff">
    <circle cx="120" cy="70" r="2" opacity="0.7">
      <animate attributeName="cy" values="70;55;70" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.9;0.2" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="190" r="1.6" opacity="0.5">
      <animate attributeName="cy" values="190;205;190" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.1;0.7;0.1" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="200" r="2" opacity="0.6">
      <animate attributeName="cy" values="200;180;200" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.8;0.15" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="840" cy="60" r="1.6" opacity="0.5">
      <animate attributeName="cy" values="60;78;60" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="930" cy="150" r="2.2" opacity="0.6">
      <animate attributeName="cy" values="150;132;150" dur="7.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.85;0.2" dur="7.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- cristal de obsidiana (facetas) -->
  <g transform="translate(120 130)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="36s" repeatCount="indefinite"/>
      <polygon points="0,-58 50,-18 32,52 -32,52 -50,-18" fill="#1c1330" stroke="url(#purple)" stroke-width="2"/>
      <polygon points="0,-58 50,-18 0,0" fill="#6e3bff" fill-opacity="0.30"/>
      <polygon points="50,-18 32,52 0,0" fill="#9a78ff" fill-opacity="0.18"/>
      <polygon points="32,52 -32,52 0,0" fill="#6e3bff" fill-opacity="0.12"/>
      <polygon points="-32,52 -50,-18 0,0" fill="#9a78ff" fill-opacity="0.22"/>
      <polygon points="-50,-18 0,-58 0,0" fill="#6e3bff" fill-opacity="0.16"/>
    </g>
    <circle r="78" fill="#6e3bff" opacity="0.12" filter="url(#soft)">
      <animate attributeName="opacity" values="0.06;0.20;0.06" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- título -->
  <text x="250" y="118" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="62" font-weight="800" letter-spacing="3" fill="#ffffff">
    YAD CARIAS
    <animate attributeName="fill" values="#ffffff;#e6ddff;#ffffff" dur="5s" repeatCount="indefinite"/>
  </text>

  <!-- brillo recorriendo el título -->
  <text x="250" y="118" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="62" font-weight="800" letter-spacing="3" fill="url(#shine)" opacity="0.0">
    YAD CARIAS
    <animate attributeName="opacity" values="0;0.9;0" dur="5s" begin="1s" repeatCount="indefinite"/>
  </text>

  <!-- línea divisoria -->
  <rect x="252" y="138" width="0" height="3" rx="1.5" fill="url(#purple)">
    <animate attributeName="width" values="0;360;360" dur="2s" fill="freeze"/>
  </rect>

  <!-- subtítulo -->
  <text x="252" y="178" font-family="'Fira Code',Consolas,monospace" font-size="20" font-weight="600" fill="#9a78ff">
    Fundador &amp; CEO · Obsidian-Sec
  </text>

  <!-- línea técnica con cursor -->
  <text x="252" y="208" font-family="'Fira Code',Consolas,monospace" font-size="14" fill="#6b7280">
    red team · seguridad ofensiva · desarrollo
  </text>
  <rect x="252" y="222" width="9" height="3" fill="#6e3bff">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- borde inferior degradado -->
  <rect x="0" y="257" width="1000" height="3" fill="url(#purple)"/>
</svg>
